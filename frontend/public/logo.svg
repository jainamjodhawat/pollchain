<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="12" fill="url(#grad)"/>
  <!-- Chain link left -->
  <rect x="8" y="20" width="14" height="8" rx="4" fill="white" opacity="0.95"/>
  <!-- Chain link right -->
  <rect x="26" y="20" width="14" height="8" rx="4" fill="white" opacity="0.95"/>
  <!-- Connecting dot -->
  <circle cx="24" cy="24" r="3.5" fill="url(#grad2)"/>
  <!-- Top dot (vote up) -->
  <circle cx="24" cy="11" r="3" fill="white" opacity="0.7"/>
  <!-- Bottom dot (vote down) -->
  <circle cx="24" cy="37" r="3" fill="white" opacity="0.7"/>
  <!-- Vertical connector top -->
  <rect x="22.5" y="14" width="3" height="6" rx="1.5" fill="white" opacity="0.5"/>
  <!-- Vertical connector bottom -->
  <rect x="22.5" y="28" width="3" height="6" rx="1.5" fill="white" opacity="0.5"/>
</svg>

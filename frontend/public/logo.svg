<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3d4a1e"/>
      <stop offset="100%" stop-color="#5c6b2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- Ballot box outline -->
  <rect x="10" y="18" width="28" height="20" rx="3" stroke="#e8edcf" stroke-width="2.2" fill="none"/>
  <!-- Slot on top -->
  <rect x="20" y="16" width="8" height="4" rx="2" fill="#e8edcf"/>
  <!-- Check mark inside -->
  <polyline points="16,28 21,33 32,23" stroke="#a8b86a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>

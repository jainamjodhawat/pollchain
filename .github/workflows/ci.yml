name: PollChain CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Smart Contract Tests ──────────────────────────────────────────────────
  contracts:
    name: Soroban Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run contract tests
        run: cargo test --workspace --verbose

      - name: Build contracts (WASM)
        run: cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Clippy lint
        run: cargo clippy --workspace -- -W warnings
        continue-on-error: true

  # ── Frontend Build & Lint ─────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_GOVERNANCE_TOKEN_CONTRACT_ID: ${{ secrets.VITE_GOVERNANCE_TOKEN_CONTRACT_ID }}
          VITE_VOTING_CONTRACT_ID: ${{ secrets.VITE_VOTING_CONTRACT_ID }}
          VITE_EXECUTION_CONTRACT_ID: ${{ secrets.VITE_EXECUTION_CONTRACT_ID }}
          VITE_FAUCET_CONTRACT_ID: ${{ secrets.VITE_FAUCET_CONTRACT_ID }}
          VITE_TREASURY_CONTRACT_ID: ${{ secrets.VITE_TREASURY_CONTRACT_ID }}
          VITE_DELEGATION_CONTRACT_ID: ${{ secrets.VITE_DELEGATION_CONTRACT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Security Audit ────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true
